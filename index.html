<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audio A/B Test · Blind Listening</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,400&family=Inter+Tight:wght@400;500;600&family=Noto+Serif+TC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="runner.css" />
  <link rel="stylesheet" href="overview.css" />
</head>

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
    integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
    integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
    crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
    integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
    crossorigin="anonymous"></script>

  <script>
    // Cloud submission endpoint.
    //
    // Paste the Google Apps Script "/exec" URL here after deploying
    // server/apps-script.gs (see README for the 5-minute walkthrough).
    //
    // Leave as "" to run in export-only mode — the Submit button will
    // download a JSON file instead of uploading.
    window.SUBMIT_URL = "https://script.google.com/macros/s/AKfycbzwft-In7TB1HFCPg-PSS3UTRTvA21JlHPxTJ6rmXIiBxtaJEWTK-12qMA12MfKz21NdA/exec";
  </script>

  <script src="data.js?v=2"></script>
  <script type="text/babel" src="runner.jsx?v=2"></script>
  <script type="text/babel" src="overview.jsx?v=2"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Schema v3: introduced round sampling (selection + abMap) and
    // per-participant seen tracking so repeat rounds get different clips.
    const STORAGE_KEY = "audio-ab-test-state-v4";
    const LEGACY_STORAGE_KEYS = ["tonewright-state-v3"];
    const SEEN_KEY = "audio-ab-test-seen-v4";
    const LEGACY_SEEN_KEYS = ["tonewright-seen-v3"];
    const VALID_DATA_KEYS = new Set([DATA.project, ...(window.LEGACY_PROJECT_KEYS || [])]);

    function loadState() {
      for (const key of [STORAGE_KEY, ...LEGACY_STORAGE_KEYS]) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) continue;
          const parsed = JSON.parse(raw);
          if (!parsed.dataKey || VALID_DATA_KEYS.has(parsed.dataKey)) return parsed;
        } catch (e) { }
      }
      return null;
    }

    function loadSeen() {
      for (const key of [SEEN_KEY, ...LEGACY_SEEN_KEYS]) {
        try {
          const raw = localStorage.getItem(key);
          if (raw) return JSON.parse(raw);
        } catch (e) { }
      }
      return {};
    }

    function saveSeen(seen) {
      try { localStorage.setItem(SEEN_KEY, JSON.stringify(seen)); } catch (e) { }
    }

    function LanguageSwitch({ lang, setLang }) {
      return (
        <div className="lang-seg" role="group" aria-label="Language">
          <button
            type="button"
            className={lang === "en" ? "active" : ""}
            onClick={() => setLang("en")}
            aria-pressed={lang === "en"}
          >EN</button>
          <button
            type="button"
            className={lang === "zh" ? "active" : ""}
            onClick={() => setLang("zh")}
            aria-pressed={lang === "zh"}
          >中</button>
        </div>
      );
    }

    function Welcome({ startRound, suggestedName, lang, setLang }) {
      const copy = getText(lang);
      const [name, setName] = useState(suggestedName || "");
      const start = () => {
        const trimmed = name.trim();
        if (!trimmed) return;
        startRound(trimmed);
      };
      return (
        <div className="canvas welcome-canvas">
          <div className="welcome-card">
            <div className="eyebrow">{copy.welcome.eyebrow}</div>
            <h1>{copy.welcome.titleLead} <em>{copy.welcome.heroName}</em></h1>
            <p>{copy.welcome.intro(DATA.roundSize)}</p>
            <ul>
              {getMetrics(lang).map(metric => (
                <li key={metric.key}>
                  <strong>{metric.label}</strong> {copy.welcome.criteria[metric.key]}
                </li>
              ))}
            </ul>
            <ul className="welcome-tips">
              {copy.welcome.blindNotice(DATA.roundSize, DATA.pool.length).map((line, i) => (
                <li key={i}>{line}</li>
              ))}
            </ul>
            <label htmlFor="participant-name">{copy.welcome.nameLabel}</label>
            <input
              id="participant-name"
              type="text"
              value={name}
              onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") start(); }}
              placeholder={copy.welcome.namePlaceholder}
              autoFocus
            />
            <button
              className="btn btn-primary welcome-start"
              disabled={!name.trim()}
              onClick={start}
            >
              {copy.welcome.start} →
            </button>
          </div>
        </div>
      );
    }

    function App() {
      const initial = loadState() || {};
      const [lang, setLang] = useState(initial.lang || "en");
      const [view, setView] = useState(initial.view || "runner");
      const [state, setState] = useState({
        participant: initial.participant || "",
        startedAt: initial.startedAt || null,
        roundIndex: initial.roundIndex || 0,
        selection: initial.selection || [],
        abMap: initial.abMap || [],
        poolResetThisRound: initial.poolResetThisRound || false,
        currentIdx: initial.currentIdx || 0,
        answers: initial.answers || {},
        revealed: initial.revealed || false,
        submitting: initial.submitting || false,
        submitted: initial.submitted || false,
      });
      const copy = getText(lang);

      useEffect(() => {
        document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
      }, [lang]);

      useEffect(() => {
        const payload = {
          lang,
          view,
          participant: state.participant,
          startedAt: state.startedAt,
          roundIndex: state.roundIndex,
          selection: state.selection,
          abMap: state.abMap,
          poolResetThisRound: state.poolResetThisRound,
          currentIdx: state.currentIdx,
          answers: state.answers,
          revealed: state.revealed,
          submitting: state.submitting,
          submitted: state.submitted,
          dataKey: DATA.project,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }, [lang, view, state]);

      const goto = (v) => { setView(v); window.scrollTo({ top: 0, behavior: "smooth" }); };

      // Begin a fresh round for this participant (samples from the pool).
      const startRound = (name, prevRoundIndex = 0) => {
        const { indices, poolReset } = planRound(name);
        setState({
          participant: name,
          startedAt: new Date().toISOString(),
          roundIndex: prevRoundIndex + 1,
          selection: indices,
          abMap: makeAbMap(indices.length),
          poolResetThisRound: poolReset,
          currentIdx: 0,
          answers: {},
          revealed: false,
          submitting: false,
          submitted: false,
        });
        setView("runner");
        window.scrollTo({ top: 0, behavior: "smooth" });
      };

      // Called from Runner/Overview when user clicks "View Results" —
      // shows a confirm dialog, then locks answers and navigates to
      // Results (which auto-submits on mount).
      const requestViewResults = () => {
        const submitUrl = (typeof window !== "undefined" && window.SUBMIT_URL) || "";
        const hasEndpoint = !!submitUrl;
        const round = state.roundIndex || 1;
        const participant = state.participant;
        const msg = hasEndpoint
          ? copy.results.submitConfirm(round, participant)
          : copy.results.exportConfirm(round, participant);
        if (!confirm(msg)) return;
        setState(s => ({ ...s, submitting: true, revealed: true }));
        goto("results");
      };

      // Called by Results after a successful submit — record the round's
      // clips as seen, then sample & start the next round for the same
      // participant.
      const finishAndStartNext = (submittedClipIds, poolResetHappened) => {
        recordRound(state.participant, submittedClipIds, poolResetHappened);
        startRound(state.participant, state.roundIndex || 0);
      };

      const switchParticipant = () => {
        setState({
          participant: "", startedAt: null, roundIndex: 0,
          selection: [], abMap: [], poolResetThisRound: false,
          currentIdx: 0, answers: {}, revealed: false,
          submitting: false, submitted: false,
        });
      };

      // Welcome screen shown whenever participant name is empty
      if (!state.participant) {
        return (
          <div className="app">
            <div className="topbar">
              <div className="topbar-inner">
                <div className="brand">
                  <span className="brand-dot" />
                  {DATA.appName}
                  <span className="sub">{DATA.projectLabel}</span>
                </div>
                <div className="topbar-controls">
                  <LanguageSwitch lang={lang} setLang={setLang} />
                </div>
              </div>
            </div>
            <Welcome startRound={(name) => startRound(name, 0)} suggestedName={latestParticipantName()} lang={lang} setLang={setLang} />
          </div>
        );
      }

      return (
        <div className="app">
          <div className="topbar">
            <div className="topbar-inner">
              <div className="brand">
                <span className="brand-dot" />
                {DATA.appName}
                <span className="sub">{DATA.projectLabel}</span>
                <span className="participant-chip">
                  {state.participant}
                  <button
                    type="button"
                    className="switch-btn"
                    onClick={switchParticipant}
                    title={copy.common.switchParticipant}
                    aria-label={copy.common.switchParticipant}
                  >×</button>
                </span>
              </div>
              <div className="topbar-controls">
                <div className="nav">
                  <button className={view === "runner" ? "active" : ""} disabled={state.submitting} onClick={() => goto("runner")}>{copy.nav.evaluate}</button>
                  <button className={view === "overview" ? "active" : ""} disabled={state.submitting} onClick={() => goto("overview")}>{copy.nav.overview}</button>
                  <button className={view === "results" ? "active" : ""} disabled={!state.submitted && !state.submitting} onClick={() => goto("results")}>{copy.nav.results}</button>
                </div>
                <LanguageSwitch lang={lang} setLang={setLang} />
              </div>
            </div>
          </div>

          {view === "runner" && <Runner state={state} setState={setState} goto={goto} lang={lang} requestViewResults={requestViewResults} />}
          {view === "overview" && <Overview state={state} setState={setState} goto={goto} lang={lang} requestViewResults={requestViewResults} />}
          {view === "results" && <Results state={state} setState={setState} goto={goto} finishAndStartNext={finishAndStartNext} lang={lang} />}
        </div>
      );
    }

    const participantKey = (name) => (name || "").trim().toLowerCase();

    // Return the most-recently-used display name, to pre-fill Welcome.
    function latestParticipantName() {
      const seen = loadSeen();
      let best = null, bestTs = 0;
      for (const key of Object.keys(seen)) {
        const e = seen[key];
        const ts = e.lastUsedAt ? Date.parse(e.lastUsedAt) : 0;
        if (ts >= bestTs) { bestTs = ts; best = e.displayName || key; }
      }
      return best || "";
    }

    // Prepare a fresh round's selection for this participant (excluding
    // clips they've already seen, resetting the seen set if the unseen
    // pool is too small).
    function planRound(participant) {
      const seen = loadSeen();
      const entry = seen[participantKey(participant)] || { seenClipIds: [] };
      return sampleRoundIndices(DATA.pool, DATA.roundSize, entry.seenClipIds);
    }

    // After a successful submit, merge this round's clipIds into the
    // participant's seen set. If the round triggered a pool reset,
    // start the seen set over (containing just this round's clips).
    function recordRound(participant, clipIds, poolReset) {
      const seen = loadSeen();
      const key = participantKey(participant);
      const prev = seen[key] || {
        displayName: participant,
        seenClipIds: [],
        roundsCompleted: 0,
        poolResetCount: 0,
      };
      const mergedSeen = poolReset
        ? [...clipIds]
        : [...new Set([...prev.seenClipIds, ...clipIds])];
      seen[key] = {
        displayName: participant,
        seenClipIds: mergedSeen,
        roundsCompleted: (prev.roundsCompleted || 0) + 1,
        poolResetCount: (prev.poolResetCount || 0) + (poolReset ? 1 : 0),
        lastUsedAt: new Date().toISOString(),
      };
      saveSeen(seen);
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
